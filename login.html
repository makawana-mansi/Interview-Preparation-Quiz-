<!DOCTYPE html>
<html>

<head>
  <title>Login</title>

  <style>
    body {
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .card1 {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      align-items: center;
    }

    .btn-light {
      display: flex;
      padding: 10px;
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
    }

    .divider {
      margin: 20px 0;
      color: #888;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-sizing: border-box;
    }

    .btn-main {
      width: 100%;
      padding: 12px;
      background: #6200ee;
      color: black;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;

    }

    .btn-main:hover {
      background: #1aa892;
      color: white;
    }

    .blue-link {
      color: #6236FF;
      text-decoration: none;
      font-size: 14px;
      display: block;
      margin: 10px 0;
    }

    #msg {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card1">
    <h1>Log in with</h1>

    <div class="row">
      <div class="btn-light">
        <img src="pic.jpeg" height="30px">Google
      </div>

      <div class="btn-light">
        <img src="pic2.png" height="30px">Apple
      </div>

    </div>

    <div class="divider">or</div>

    <form onsubmit="login(event)">



      <input type="email" id="email" placeholder="Email address" required>

      <input type="password" id="password" placeholder="......" required>


      <a href="submit" class="btn-link">Forgot password?</a>

      <button type="submit" class="btn-main">Log In</button>
    </form>
    <p>Don't have an account?

      <a href="#" class="blue-link">Signup now</a>

    </p>


    <p id="msg"></p>
  </div>

  <script>


    function login(e) {

      e.preventDefault();
      let user = document.getElementById("email").value.trim();
      let pass = document.getElementById("password").value.trim();

      if (user === "mansi66@gmail.com" && pass === "1234") {
        localStorage.setItem("login", "true");

        let page = localStorage.getItem("redirectPage");

        localStorage.removeItem("redirectPage");

        if (page) {
          window.location.href = page;
        }
        else {
          window.location.href = "home.html";
        }
      }

      else {
        document.getElementById("msg").innerText = "Invalid Login!";
      }
    }

  </script>

</body>

</html>
